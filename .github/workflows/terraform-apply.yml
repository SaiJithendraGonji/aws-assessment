name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VERSION: "1.14.6"

jobs:
  await-approval:
    name: Await Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval gate
        run: echo "Approved. Proceeding with apply."

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: await-approval
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply \
            -input=false \
            -no-color \
            -auto-approve \
            -var="candidate_email=${{ secrets.CANDIDATE_EMAIL }}"

      - name: Capture Outputs
        id: tf-outputs
        run: |
          echo "us_east_1_endpoint=$(terraform output -raw api_endpoint_us_east_1)" >> $GITHUB_OUTPUT
          echo "eu_west_1_endpoint=$(terraform output -raw api_endpoint_eu_west_1)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT

    outputs:
      us_east_1_endpoint: ${{ steps.tf-outputs.outputs.us_east_1_endpoint }}
      eu_west_1_endpoint: ${{ steps.tf-outputs.outputs.eu_west_1_endpoint }}
      cognito_client_id: ${{ steps.tf-outputs.outputs.cognito_client_id }}
      cognito_user_pool_id: ${{ steps.tf-outputs.outputs.cognito_user_pool_id }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: apply
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3 requests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run integration tests
        env:
          US_EAST_1_ENDPOINT: ${{ needs.apply.outputs.us_east_1_endpoint }}
          EU_WEST_1_ENDPOINT: ${{ needs.apply.outputs.eu_west_1_endpoint }}
          COGNITO_CLIENT_ID: ${{ needs.apply.outputs.cognito_client_id }}
          COGNITO_USER_POOL_ID: ${{ needs.apply.outputs.cognito_user_pool_id }}
          CANDIDATE_EMAIL: ${{ secrets.CANDIDATE_EMAIL }}
        run: python scripts/test_deployment.py